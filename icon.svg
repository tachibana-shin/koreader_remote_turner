<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B7FFF"/>
      <stop offset="100%" stop-color="#2E3FBF"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="192" fill="url(#bg)"/>

  <!-- Open book -->
  <!-- Left page -->
  <path d="M 512,300
           L 280,310
           Q 270,510 290,700
           L 512,680 Z"
        fill="white" opacity="0.95"/>
  <!-- Right page -->
  <path d="M 512,300
           L 744,310
           Q 754,510 734,700
           L 512,680 Z"
        fill="white" opacity="0.95"/>

  <!-- Book spine shadow -->
  <line x1="512" y1="295" x2="512" y2="690" stroke="#2E3FBF" stroke-width="4" stroke-linecap="round" opacity="0.15"/>

  <!-- Text lines on left page -->
  <line x1="320" y1="400" x2="480" y2="395" stroke="#2E3FBF" stroke-width="6" stroke-linecap="round" opacity="0.12"/>
  <line x1="320" y1="450" x2="480" y2="445" stroke="#2E3FBF" stroke-width="6" stroke-linecap="round" opacity="0.12"/>
  <line x1="320" y1="500" x2="480" y2="495" stroke="#2E3FBF" stroke-width="6" stroke-linecap="round" opacity="0.12"/>
  <line x1="320" y1="550" x2="460" y2="545" stroke="#2E3FBF" stroke-width="6" stroke-linecap="round" opacity="0.12"/>

  <!-- Text lines on right page -->
  <line x1="544" y1="395" x2="704" y2="400" stroke="#2E3FBF" stroke-width="6" stroke-linecap="round" opacity="0.12"/>
  <line x1="544" y1="445" x2="704" y2="450" stroke="#2E3FBF" stroke-width="6" stroke-linecap="round" opacity="0.12"/>
  <line x1="544" y1="495" x2="704" y2="500" stroke="#2E3FBF" stroke-width="6" stroke-linecap="round" opacity="0.12"/>
  <line x1="544" y1="545" x2="684" y2="550" stroke="#2E3FBF" stroke-width="6" stroke-linecap="round" opacity="0.12"/>

  <!-- Page turn arrow on right -->
  <path d="M 770,450 L 830,510 L 770,570"
        fill="none" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Wireless signal arcs -->
  <path d="M 800,220 Q 840,260 800,300"
        fill="none" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
  <path d="M 830,190 Q 880,260 830,330"
        fill="none" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <path d="M 860,160 Q 920,260 860,360"
        fill="none" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.25"/>
</svg>

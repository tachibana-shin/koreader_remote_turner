name: Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Flutter
        id: cache-flutter
        uses: actions/cache@v4
        with:
          path: _flutter
          key: flutter-stable-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
      - name: Install Flutter
        if: steps.cache-flutter.outputs.cache-hit != 'true'
        run: git clone --depth 1 https://github.com/flutter/flutter.git -b stable _flutter
      - name: Add Flutter to PATH
        run: echo "$(pwd)/_flutter/bin" >> $GITHUB_PATH
      - run: flutter pub get
      - run: flutter analyze
      - run: dart format --set-exit-if-changed lib/

  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y lua-check
      - run: luacheck remote_turner.koplugin/

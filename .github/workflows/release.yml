name: Release

on:
  push:
    branches: [main]

jobs:
  ci:
    uses: ./.github/workflows/check.yml
  semantic:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semantic.outputs.version }}
      released: ${{ steps.semantic.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 25

      - run: npm i

      - name: Semantic release
        id: semantic
        run: |
          BEFORE=$(git tag -l 'v*' --sort=-version:refname | head -1)
          npx semantic-release 2>&1 || true
          AFTER=$(git tag -l 'v*' --sort=-version:refname | head -1)
          if [ "$BEFORE" != "$AFTER" ] && [ -n "$AFTER" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=${AFTER#v}" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: semantic
    if: needs.semantic.outputs.released == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: android
          - os: ubuntu-latest
            target: linux
          - os: macos-latest
            target: macos
          - os: macos-latest
            target: koplugin
          - os: windows-latest
            target: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.semantic.outputs.version }}

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: 3.44.2

      - run: flutter pub get

      - name: Install Linux toolchain
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Install Windows toolchain
        if: matrix.target == 'windows'
        run: choco install innosetup

      - name: Install macOS toolchain
        if: matrix.target == 'macos'
        run: |
          brew install --quiet ninja libimobiledevice || true

      - run: make ${{ matrix.target }} VERSION=${{ needs.semantic.outputs.version }}
        env:
          BUILD_NUMBER: ${{ github.run_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: dist/*

  publish:
    needs: [semantic, build]
    if: needs.semantic.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Upload assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: v${{ needs.semantic.outputs.version }}
        run: |
          shopt -s globstar
          for f in build-*/**/*; do
            if [ -f "$f" ]; then
              gh release upload "$VERSION" "$f" --clobber
            fi
          done

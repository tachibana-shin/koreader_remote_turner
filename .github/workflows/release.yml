name: Release

on:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.dry.outputs.version }}
      should_release: ${{ steps.dry.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 25

      - run: npm i

      - name: Dry run
        id: dry
        run: |
          OUTPUT=$(npx semantic-release --dry-run 2>&1 || true)
          echo "$OUTPUT"
          VERSION=$(echo "$OUTPUT" | grep -oP 'release version is \K\d+\.\d+\.\d+' || true)
          if [ -n "$VERSION" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: android
          - os: ubuntu-latest
            target: linux
          - os: macos-latest
            target: macos
          - os: macos-latest
            target: koplugin
          - os: windows-latest
            target: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: 3.44.2

      - run: flutter pub get

      - name: Install Linux toolchain
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Install Windows toolchain
        if: matrix.target == 'windows'
        run: choco install innosetup

      - name: Install macOS toolchain
        if: matrix.target == 'macos'
        run: |
          brew install --quiet ninja libimobiledevice || true

      - run: make ${{ matrix.target }} VERSION=${{ needs.check.outputs.version }}
        env:
          BUILD_NUMBER: ${{ github.run_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: dist/*

  release:
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/download-artifact@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25

      - run: npm i

      - name: Semantic release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
